version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AI SOC Agent NIDS — Docker Compose (Demo / Development mode)
#
# The AI agent image bundles all 4 MCP servers (spawned via stdio internally).
# This compose file wires up volumes for live Zeek/Suricata logs and the
# persistent MITRE ATT&CK cache.
#
# Prerequisite: Build the image from the repo root:
#   docker compose build
#
# Usage:
#   cp ai-soc-agent/.env.example .env   # fill in GEMINI_API_KEY + Wazuh creds
#   docker compose up
#   docker compose down
#
# For the full lab environment (pfSense, Zeek, Suricata, Wazuh) see:
#   NIDS_Full_Milestone_Guide.md
# ─────────────────────────────────────────────────────────────────────────────

services:
  ai-soc-agent:
    build:
      context: .
      dockerfile: ai-soc-agent/Dockerfile
    image: ai-soc-agent:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: info
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      MCP_READONLY: "true"
      # Sensor paths (mount host dirs below as volumes)
      ZEEK_LOG_DIR: /data/zeek
      ZEEK_LOG_FORMAT: ${ZEEK_LOG_FORMAT:-json}
      SURICATA_EVE_LOG: /data/suricata/eve.json
      ZEEK_LOGS_DIR: /data/zeek
      # Wazuh API
      WAZUH_URL: ${WAZUH_URL:-https://100.64.0.2:55000}
      WAZUH_USERNAME: ${WAZUH_USERNAME:-wazuh-wui}
      WAZUH_PASSWORD: ${WAZUH_PASSWORD:-}
      WAZUH_VERIFY_SSL: ${WAZUH_VERIFY_SSL:-false}
      WAZUH_INDEXER_URL: ${WAZUH_INDEXER_URL:-}
      WAZUH_INDEXER_USERNAME: ${WAZUH_INDEXER_USERNAME:-admin}
      WAZUH_INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-}
      WAZUH_INDEXER_VERIFY_SSL: ${WAZUH_INDEXER_VERIFY_SSL:-false}
      # MITRE ATT&CK
      MITRE_MATRICES: enterprise
      MITRE_DATA_DIR: /data/mitre
    volumes:
      # Point these at your actual Zeek / Suricata log directories, or leave
      # as named volumes for demo mode (empty — MCP servers handle gracefully).
      - zeek-logs:/data/zeek:ro
      - suricata-logs:/data/suricata:ro
      - mitre-cache:/data/mitre
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  zeek-logs:
    driver: local
    driver_opts:
      type: none
      device: ${ZEEK_HOST_LOG_DIR:-/tmp/zeek-demo-logs}
      o: bind
  suricata-logs:
    driver: local
    driver_opts:
      type: none
      device: ${SURICATA_HOST_LOG_DIR:-/tmp/suricata-demo-logs}
      o: bind
  mitre-cache:
